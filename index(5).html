<!DOCTYPE html>

    <style>
        html, body { height: 100%; margin: 0; }
        body { background-color: #008080; }
        main { min-height: calc(100vh - 80px); }

        .now-playing-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
        }
        .now-playing-row + .now-playing-row {
            border-top: 1px solid #888;
        }
        .np-art {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
            border: 2px inset #fff;
            background: #c0c0c0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            overflow: hidden;
        }
        .np-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .np-info {
            flex: 1;
            min-width: 0;
            text-align: left;
        }
        .np-label {
            font-size: 10px;
            color: #555;
            font-family: 'MS Sans Serif', Arial, sans-serif;
            margin-bottom: 1px;
        }
        .np-title {
            font-size: 13px;
            font-weight: bold;
            font-family: 'MS Sans Serif', Arial, sans-serif;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #000;
        }
        .np-sub {
            font-size: 11px;
            color: #444;
            font-family: 'MS Sans Serif', Arial, sans-serif;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .np-wave {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 24px;
            flex-shrink: 0;
        }
        .np-wave .bar {
            width: 3px;
            background: #000080;
            border-radius: 0;
            animation: w95wave 0.8s ease-in-out infinite;
        }
        .np-wave .bar.movie {
            background: #800000;
        }
        @keyframes w95wave {
            0%, 100% { transform: scaleY(0.15); }
            50%       { transform: scaleY(1); }
        }
        .np-shuffle {
            flex-shrink: 0;
            font-size: 11px;
            padding: 1px 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<main>

            <div class="col-12 col-xl-8">

                    </div>

                            <div class="col-6 mb-2">
                                <a href="achievements.html" class="btn btn-sm btn-primary border-dark w-100"><span class="btn-text">🏆 Achievements</span></a>
                            </div>
                            <div class="col-6 mb-2">
                                <a href="contact.html" class="btn btn-sm btn-primary border-dark w-100"><span class="btn-text">✉️ Contact</span></a>
                            </div>
                            <div class="col-6 mb-2">
                                <a href="index.html" class="btn btn-sm btn-primary border-dark w-100"><span class="btn-text">🏠 Home</span></a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Now Playing card -->
                <div class="card card-tertiary">
                    <div class="card-header text-center">
                        <span>Now Playing</span>
                    </div>
                    <div class="card-body" style="padding: 8px 12px;">

                        <div class="now-playing-row">
                            <div class="np-art" id="music-art"><span>🎵</span></div>
                            <div class="np-info">
                                <div class="np-label">🎵 currently listening to</div>
                                <div class="np-title" id="song-title">Loading...</div>
                                <div class="np-sub" id="song-sub"></div>
                            </div>
                            <div class="np-wave" id="music-wave"></div>
                            <button class="btn btn-sm btn-primary border-dark np-shuffle" onclick="refreshMusic()">↻</button>
                        </div>

                        <div class="now-playing-row">
                            <div class="np-art" id="movie-art"><span>🎬</span></div>
                            <div class="np-info">
                                <div class="np-label">🎬 currently watching</div>
                                <div class="np-title" id="movie-title">Loading...</div>
                                <div class="np-sub" id="movie-sub"></div>
                            </div>
                            <div class="np-wave" id="movie-wave"></div>
                            <button class="btn btn-sm btn-primary border-dark np-shuffle" onclick="refreshMovie()">↻</button>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

const movies = [
    { title: "Dune: Part Two",                    year: "2024", genre: "Sci-Fi · Epic",       emoji: "🏜️" },
    { title: "Oppenheimer",                        year: "2023", genre: "Drama · History",     emoji: "💥" },
    { title: "The Substance",                      year: "2024", genre: "Horror · Thriller",   emoji: "🩸" },
    { title: "Poor Things",                        year: "2023", genre: "Fantasy · Comedy",    emoji: "🦋" },
    { title: "Interstellar",                       year: "2014", genre: "Sci-Fi · Drama",      emoji: "🌌" },
    { title: "Everything Everywhere All at Once",  year: "2022", genre: "Sci-Fi · Action",     emoji: "🥢" },
    { title: "Past Lives",                         year: "2023", genre: "Romance · Drama",     emoji: "🌊" },
    { title: "The Batman",                         year: "2022", genre: "Action · Crime",      emoji: "🦇" },
    { title: "Saltburn",                           year: "2023", genre: "Thriller · Mystery",  emoji: "🌹" },
    { title: "Civil War",                          year: "2024", genre: "Action · Drama",      emoji: "📷" }
];

let usedSongs = [], usedMovies = [];

function pickRandom(arr, used) {
    let pool = arr.map((_, i) => i).filter(i => !used.includes(i));
    if (!pool.length) { used.length = 0; pool = arr.map((_, i) => i); }
    const idx = pool[Math.floor(Math.random() * pool.length)];
    used.push(idx);
    return arr[idx];
}

function buildWave(id, type) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    [0.3,0.7,1,0.5,0.9,0.4,0.8,0.6,0.3,0.7].forEach((h, i) => {
        const b = document.createElement('div');
        b.className = 'bar' + (type === 'movie' ? ' movie' : '');
        b.style.height = (24 * h) + 'px';
        b.style.animationDelay = (i * 0.09) + 's';
        b.style.animationDuration = (0.6 + Math.random() * 0.5) + 's';
        el.appendChild(b);
    });
}

function loadCoverArt(artEl, id, type) {
    if (!id) { artEl.innerHTML = '<span>🎵</span>'; return; }
    const base = type === 'rg'
        ? 'https://coverartarchive.org/release-group/' + id + '/front-250'
        : 'https://coverartarchive.org/release/' + id + '/front-250';
    artEl.innerHTML = '<span>🎵</span>';
    const img = new Image();
    img.onload = function() {
        artEl.innerHTML = '';
        const tag = document.createElement('img');
        tag.src = base;
        artEl.appendChild(tag);
    };
    img.onerror = function() {
        artEl.innerHTML = '<span>🎵</span>';
    };
    img.src = base;
}

function refreshMusic() {
    const s = pickRandom(songs, usedSongs);
    document.getElementById('song-title').textContent = s.title;
    document.getElementById('song-sub').textContent = s.artist + ' · ' + s.album;
    loadCoverArt(document.getElementById('music-art'), s.id, s.type);
    buildWave('music-wave', 'music');
}

function refreshMovie() {
    const m = pickRandom(movies, usedMovies);
    document.getElementById('movie-title').textContent = m.title;
    document.getElementById('movie-sub').textContent = m.year + ' · ' + m.genre;
    document.getElementById('movie-art').innerHTML = '<span>' + m.emoji + '</span>';
    buildWave('movie-wave', 'movie');
}

function updateClock() {
    const now = new Date(); let h = now.getHours(), m = now.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
    const t = h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
}

refreshMusic();
refreshMovie();
updateClock();
setInterval(updateClock, 10000);
